<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>IvCalend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ 'light-theme' if theme == 'light' else 'dark-theme' }}">

<a class="theme-toggle" href="{{ url_for('toggle_theme', next=request.full_path) }}" data-theme-toggle>
  {% if theme == 'light' %}☀️{% else %}🌙{% endif %}
</a>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-box">
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

<script>
  const themeToggle = document.querySelector("[data-theme-toggle]");

  if (themeToggle) {
    themeToggle.addEventListener("click", async (event) => {
      event.preventDefault();

      try {
        const response = await fetch(themeToggle.href, {
          headers: { "X-Theme-Request": "smooth" }
        });
        const data = await response.json();
        const isLight = data.theme === "light";

        document.body.classList.toggle("light-theme", isLight);
        document.body.classList.toggle("dark-theme", !isLight);
        themeToggle.textContent = isLight ? "☀️" : "🌙";
      } catch (error) {
        window.location.href = themeToggle.href;
      }
    });
  }
</script>

</body>
</html>

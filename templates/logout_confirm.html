{% extends "base.html" %}
{% block content %}
<div class="overlay-page">
  <div class="auth-box small-box logout-box">
    <h2>Выйти из аккаунта?</h2>
    <p class="detail-line">Вы уверены, что хотите выйти?</p>
    <div class="modal-buttons">
      <a href="{{ url_for('calendar_page') }}" class="btn-outline">Отмена</a>
      <form method="POST" action="{{ url_for('logout') }}">
        <button type="submit" class="btn-danger">Выйти</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
